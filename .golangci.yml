version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  go: '1.26'

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/DragonSecurity/gomgr

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocyclo
    - misspell
    - unconvert
    - goconst
    - revive
    - gosec
  settings:
    gocyclo:
      min-complexity: 45
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US
    revive:
      confidence: 0.8
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G304 # Audit use of file path - we need this for config files
        - G301 # Directory permissions 0755 are fine for config dirs
        - G306 # File permissions 0644 are fine for config files
        - G101 # False positives on test PEM fixtures
        - G703 # Path traversal via taint analysis - config paths come from user
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - gosec
          - goconst

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
