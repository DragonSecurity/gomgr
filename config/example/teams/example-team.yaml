name: Platform Team
description: Core platform engineers
privacy: closed
parents: []
maintainers:
  - allanice001
repositories:
  # Simple permission string (backward compatible)
  infra: maintain
  
  # Template repository - can be reused by other repos
  template-go-api:
    permission: admin
    template: true
    topics:
      - backend
      - api
      - go-template
    codeowners:
      - allanice001
    contributors:
      permissions: push
      members:
        - "@DragonSecurity/development-team"
        - octocat
  
  # Advanced config with topics and pinning
  api:
    permission: push
    topics:
      - backend
      - api
      - project-platform
    codeowners:
      - allanice001
      - "@DragonSecurity/platform-team"
  
  # Repository using template (inherits permission and topics)
  my-api:
    from: template-go-api
    topics:
      - my-project
      # Will inherit: backend, api, go-template from template
  
  # Repository with pinning
  platform-index:
    permission: admin
    topics:
      - project-platform
      - documentation
    pinned: true
  
  # Simple read-only access
  web: pull
