name: Platform Team
description: Core platform engineers
privacy: closed
parents: []
maintainers:
  - octocat
repositories:
  # Simple permission string (backward compatible)
  infra: maintain
  
  # Advanced config with topics and pinning
  api:
    permission: push
    topics:
      - backend
      - api
      - project-platform
  
  # Repository with pinning
  platform-index:
    permission: admin
    topics:
      - project-platform
      - documentation
    pinned: true
  
  # Simple read-only access
  web: pull
